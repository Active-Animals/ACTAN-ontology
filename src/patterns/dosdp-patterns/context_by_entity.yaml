pattern_name: context_by_entity

pattern_iri: https://github.com/Active-Animals/Ontology/patterns/context_by_entity

description: >-
  This pattern captures context behaviours which are best differentiated by the entities involved.

  Examples:
  - respiratory behaviour: physical-exchange that involves the respiratory system
  - parenting caring: caring that involves a family

contributors:
  - https://orcid.org/0000-0002-6601-2165
  - https://orcid.org/0000-0002-4277-2151

classes:
  context_behaviour: ACTAN:0000751
  independent_continuant: PATO:0000001
  
relations:
  has_participant: RO:0000057
  
vars:
  context: "'context_behaviour'"
  entity: "'independent_continuant'"
  
name:
  text: "%s"
  vars:
    - context

def:
  text: "%s that involves a/an %s."
  vars:
    - context
    - entity

equivalentTo:
  text: "%s and 'has_participant' some %s"
  vars:
    - context
    - entity
