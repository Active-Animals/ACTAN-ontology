pattern_name: technical_realizing_routine

pattern_iri: https://github.com/Active-Animals/Ontology/patterns/technical_realizing_routine

description: >-
 This pattern captures technical activities, defined by the routine involved.

  Examples:
  - construction: technic activity that realizes a rearrangement routine

contributors:
  - https://orcid.org/0000-0002-6601-2165
  - https://orcid.org/0000-0002-4277-2151

classes:
  technic_activity: ACTAN:0000271
  routine: ACTAN:0000397

relations:
  realizes: BFO:0000055

vars:
  technical_act: "'technic_activity'"
  routine: "'routine'"

name:
  text: "%s"
  vars:
    - technical_act

def:
  text: "%s that involves a/an %s."
  vars:
    - technical_act
    - routine

equivalentTo:
  text: "%s and 'realizes' some %s"
  vars:
    - technical_act
    - routine
