pattern_name: disposition_by_entity

pattern_iri: https://github.com/Active-Animals/Ontology/patterns/disposition_by_entity

description: >-
  This pattern captures dispositions which are best differentiated by the entities involved.

  Examples:
  - biped: pedestrian mode that involves 2 appendages
  - aerial: positional mode that involves the atmosphere

contributors:
  - https://orcid.org/0000-0002-6601-2165
  - https://orcid.org/0000-0002-4277-2151

classes:
  behavioural_disposition: BCIO:050416
  independent_continuant: PATO:0000001
  
relations:
  has_part: BFO:0000051
  
vars:
  disposition: "'behavioural_disposition'"
  entity: "'independent_continuant'"
  
name:
  text: "%s"
  vars:
    - disposition

def:
  text: "%s that involves %s."
  vars:
    - disposition
    - entity

equivalentTo:
  text: "%s and 'has_part' some %s"
  vars:
    - disposition
    - entity
